<!DOCTYPE html>
<html>
<head>
  <title>Leave Management</title>
  <link rel="stylesheet" href="css/leave.css">
</head>
<body>

<div class="container">

  <h1>Leave Management</h1>

  <div class="form-container">

    <select id="employee">
      <option value="">Select Employee</option>
    </select>

    <input type="date" id="fromDate">

    <input type="date" id="toDate">

    <input
      type="text"
      id="reason"
      placeholder="Reason"
    >

    <button onclick="applyLeave()">
      Apply Leave
    </button>

  </div>

  <table>

    <thead>
      <tr>
        <th>Employee</th>
        <th>From</th>
        <th>To</th>
        <th>Reason</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="leaveTable">

    </tbody>

  </table>

</div>

<script src="js/leave.js"></script>

</body>
</html>
